name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Clients (OpenAI, Resend, pg) are lazy-initialized, so builds only
          # need placeholder values — no live services are contacted.
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ci_placeholder
          BETTER_AUTH_SECRET: ci-placeholder-secret
          BETTER_AUTH_URL: http://localhost:3000
